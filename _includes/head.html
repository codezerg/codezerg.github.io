<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  {%- feed_meta -%}
  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}

  <!-- highlight.js support -->
  <link rel="stylesheet" href="/js/highlightjs/styles/github.css">
  <link rel="stylesheet" href="/js/highlightjs/styles/ssms.css" />
  <link rel="stylesheet" href="/js/highlightjs/styles/vs.css" />
  
  <script type="text/javascript" src="//cdn.jsdelivr.net/gh/highlightjs/cdn-release@latest/build/highlight.min.js"></script>

  <script type="text/javascript"> hljs.highlightAll(); </script>

	<!-- Code to append a click to copy button -->
	 <script>
		document.addEventListener('DOMContentLoaded', function() {
			var snippets = document.getElementsByTagName('pre');
			var numberOfSnippets = snippets.length;
			for (var i = 0; i < numberOfSnippets; i++) {
				(function(index) {
					var code = snippets[index].getElementsByTagName('code')[0].innerText;

					snippets[index].classList.add('hljs'); // append copy button to pre tag

					snippets[index].innerHTML = '<button class="hljs-copy">Copy</button>' + snippets[index].innerHTML; // append copy button

					snippets[index].getElementsByClassName('hljs-copy')[0].addEventListener("click", function () {
						this.innerText = 'Copying..';
						if (!navigator.userAgent.toLowerCase().includes('safari')) {
							navigator.clipboard.writeText(code);
						} else {
							prompt("Clipboard (Select: ⌘+a > Copy:⌘+c)", code);
						}
						this.innerText = 'Copied!';
						var button = this;
						setTimeout(function () {
							button.innerText = 'Copy';
						}, 1000);
					});
				})(i);
			}
		});
	 </script>
	 <style>
		 .hljs-copy {
			 float: right;
			 cursor: pointer;
		 }
	 </style>


  <!-- end highlight.js support -->
</head>
